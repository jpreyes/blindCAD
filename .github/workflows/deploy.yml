name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Permite disparar el workflow manualmente desde la pestaña Actions.
  workflow_dispatch:

# Permisos necesarios para desplegar a GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un despliegue a la vez.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_ACTIONS: "true"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
